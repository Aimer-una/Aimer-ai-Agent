spring:
  application:
    name: aimer-ai-agent
  datasource:
    url: jdbc:postgresql://改为你的公网地址/数据库名
    username:  改为你的用户名
    password: 改为你的密码

  ai:
    vectorstore:
      pgvector:
        index-type: hnsw
        dimensions: 1536
        distance-type: cosine_distance
        max-document-batch-size: 10000
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY}
      chat:
        options:
          model: qwen-plus
server:
  port: 8123
  servlet:
    context-path: /api

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.aimer.agent.controller

knife4j:
  enable: true
  setting:
    language: zh_cn