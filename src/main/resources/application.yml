spring:
  application:
    name: aimer-ai-agent
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: root

  mail:
    host: smtp.qq.com
    port: 587
    username: 2103095120@qq.com         # 你的 QQ 邮箱
    password: ozzfgnvczketcaeh  # QQ 邮箱的「授权码」，不是登录密码！
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  ai:
    mcp:
      client:
        stdio:
          servers-configuration: classpath:mcp-servers.json
    vectorstore:
      pgvector:
        index-type: hnsw
        dimensions: 1536
        distance-type: cosine_distance
        max-document-batch-size: 10000
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY}
      chat:
        options:
          model: qwen-plus
server:
  port: 8123
  servlet:
    context-path: /api

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.aimer.agent.controller

knife4j:
  enable: true
  setting:
    language: zh_cn

logging:
  level:
    org.springframework.ai: DEBUG